name: Daily Scan
on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  # ─── 1. TAKEOVER ───────────────────────────────────────────────
  # Uses 404 hosts only — subdomains returning 404 are takeover candidates
  takeover:
    uses: ./.github/workflows/scan-template.yml
    with:
      scan_name: "Subdomain Takeover"
      tags: "takeover,subdomain-takeover"
      input_file: "live_hosts_404"
    secrets:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

  # ─── 2. MAIN DAILY SCAN ────────────────────────────────────────
  # CVE + CORS + Admin Panels
  # new_first = scans new_live_hosts first, then remaining live_hosts
  # This way fresh targets get priority without running a separate job
  daily_main:
    uses: ./.github/workflows/scan-template.yml
    with:
      scan_name: "Daily Main"
      tags: "cve,cors,panel,admin"
      severity: "low,medium,high,critical"
      input_file: "new_first"
    secrets:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

  # ─── 3. 403 BYPASS ─────────────────────────────────────────────
  # Uses 403 hosts only — pre-filtered by weekly recon
  bypass_403:
    uses: ./.github/workflows/scan-template.yml
    with:
      scan_name: "403 Bypass"
      tags: "403"
      input_file: "live_hosts_403"
    secrets:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
