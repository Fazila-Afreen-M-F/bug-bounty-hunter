name: Daily Scan
on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      batches: ${{ steps.split.outputs.batches }}
      has_hosts: ${{ steps.split.outputs.has_hosts }}
      has_403: ${{ steps.split.outputs.has_403 }}
      has_404: ${{ steps.split.outputs.has_404 }}
    steps:
      - name: Checkout domains branch
        uses: actions/checkout@v4
        with:
          ref: domains
          fetch-depth: 1

      - name: Build host lists + calculate splits
        id: split
        run: |
          touch live_hosts.txt new_live_hosts.txt live_hosts_403.txt live_hosts_404.txt

          > combined.txt
          if [ -s new_live_hosts.txt ]; then
            cat new_live_hosts.txt >> combined.txt
          fi
          if [ -s live_hosts.txt ]; then
            if [ -s new_live_hosts.txt ]; then
              comm -23 <(sort live_hosts.txt) <(sort new_live_hosts.txt) >> combined.txt || true
            else
              cat live_hosts.txt >> combined.txt
            fi
          fi

          total=$(wc -l < combined.txt)
          total_403=$(wc -l < live_hosts_403.txt)
          total_404=$(wc -l < live_hosts_404.txt)
          echo "Total: $total | 403: $total_403 | 404: $total_404"

          if [ "$total" -eq 0 ]; then
            echo "has_hosts=false" >> $GITHUB_OUTPUT
            echo "batches=[]" >> $GITHUB_OUTPUT
          else
            echo "has_hosts=true" >> $GITHUB_OUTPUT
            num_batches=20
            if [ "$total" -lt 20 ]; then num_batches=$total; fi
            batches=$(seq 1 $num_batches | jq -R . | jq -sc .)
            echo "batches=$batches" >> $GITHUB_OUTPUT
            echo "Batches: $num_batches (~$(( (total + num_batches - 1) / num_batches )) hosts each)"
          fi

          [ "$total_403" -gt 0 ] && echo "has_403=true" >> $GITHUB_OUTPUT || echo "has_403=false" >> $GITHUB_OUTPUT
          [ "$total_404" -gt 0 ] && echo "has_404=true" >> $GITHUB_OUTPUT || echo "has_404=false" >> $GITHUB_OUTPUT

      - name: Upload host lists
        uses: actions/upload-artifact@v4
        with:
          name: daily-hosts
          path: |
            combined.txt
            live_hosts_403.txt
            live_hosts_404.txt
          retention-days: 1

  # ─── TAKEOVER ──────────────────────────────────────────────────
  takeover:
    needs: prepare
    if: needs.prepare.outputs.has_404 == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Download host lists
        uses: actions/download-artifact@v4
        with:
          name: daily-hosts

      - name: Get week number
        id: date
        run: echo "week=$(date +'%Y-%U')" >> $GITHUB_OUTPUT

      - name: Cache Go tools
        uses: actions/cache@v4
        id: cache-go
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-v4

      - name: Install nuclei
        if: steps.cache-go.outputs.cache-hit != 'true'
        run: go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest

      - name: Ensure nuclei installed
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          if ! command -v nuclei &>/dev/null; then
            go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          fi

      - name: Cache nuclei templates
        uses: actions/cache@v4
        with:
          path: ~/.local/share/nuclei-templates
          key: nuclei-templates-${{ runner.os }}-${{ steps.date.outputs.week }}
          restore-keys: nuclei-templates-${{ runner.os }}-

      - name: Download nuclei templates
        run: |
          mkdir -p $HOME/.local/share/nuclei-templates
          if [ ! -d "$HOME/.local/share/nuclei-templates/http" ]; then
            git clone --depth 1 https://github.com/projectdiscovery/nuclei-templates.git \
              $HOME/.local/share/nuclei-templates || true
          fi

      - name: Run takeover scan
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          TEMPLATES_DIR="$HOME/.local/share/nuclei-templates"
          touch results.txt
          timeout 3000 nuclei -l live_hosts_404.txt \
            -t "$TEMPLATES_DIR/http/takeovers" \
            -itags takeover,subdomain-takeover \
            -severity low,medium,high,critical \
            -silent -retries 0 -timeout 3 \
            -bulk-size 50 -concurrency 50 \
            -rate-limit 5 -fhr -max-host-error 5 \
            -no-color -o results.txt || true
          echo "Findings: $(wc -l < results.txt)"

      - name: Show results
        if: always()
        run: |
          count=$(wc -l < results.txt 2>/dev/null || echo 0)
          echo "Total findings: $count"
          if [ "$count" -gt "0" ]; then cat results.txt; else echo "No findings"; fi

      - name: Check for results
        id: check
        run: |
          if [ -s results.txt ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "count=$(wc -l < results.txt)" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "count=0" >> $GITHUB_OUTPUT
          fi

      - name: Send email alert
        if: steps.check.outputs.found == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "[Takeover] ${{ steps.check.outputs.count }} Finding(s)"
          body: file://results.txt
          to: ${{ secrets.EMAIL_TO }}
          from: BugBountyBot

  # ─── MAIN DAILY: always 20 parallel jobs ───────────────────────
  daily_main:
    needs: prepare
    if: needs.prepare.outputs.has_hosts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        batch: ${{ fromJson(needs.prepare.outputs.batches) }}
    steps:
      - name: Download host list
        uses: actions/download-artifact@v4
        with:
          name: daily-hosts

      - name: Slice hosts for this batch
        run: |
          total=$(wc -l < combined.txt)
          num_batches=${{ strategy.job-total }}
          batch_num=${{ matrix.batch }}
          batch_size=$(( (total + num_batches - 1) / num_batches ))
          start=$(( (batch_num - 1) * batch_size + 1 ))
          end=$(( batch_num * batch_size ))
          sed -n "${start},${end}p" combined.txt > input.txt
          echo "Batch $batch_num/$num_batches: $(wc -l < input.txt) of $total hosts"

      - name: Get week number
        id: date
        run: echo "week=$(date +'%Y-%U')" >> $GITHUB_OUTPUT

      - name: Cache Go tools
        uses: actions/cache@v4
        id: cache-go
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-v4

      - name: Install nuclei
        if: steps.cache-go.outputs.cache-hit != 'true'
        run: go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest

      - name: Ensure nuclei installed
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          if ! command -v nuclei &>/dev/null; then
            go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          fi

      - name: Cache nuclei templates
        uses: actions/cache@v4
        id: cache-templates
        with:
          path: ~/.local/share/nuclei-templates
          key: nuclei-templates-${{ runner.os }}-${{ steps.date.outputs.week }}
          restore-keys: nuclei-templates-${{ runner.os }}-

      - name: Download nuclei templates
        if: steps.cache-templates.outputs.cache-hit != 'true'
        run: |
          mkdir -p $HOME/.local/share/nuclei-templates
          git clone --depth 1 https://github.com/projectdiscovery/nuclei-templates.git \
            $HOME/.local/share/nuclei-templates || true

      - name: Run nuclei
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          TEMPLATES_DIR="$HOME/.local/share/nuclei-templates"
          touch results.txt

          if [ ! -s input.txt ]; then
            echo "No targets for this batch"
            exit 0
          fi

          CVE_PATHS=""
          for year in 2022 2023 2024 2025; do
            if [ -d "$TEMPLATES_DIR/http/cves/$year" ]; then
              CVE_PATHS="$CVE_PATHS,$TEMPLATES_DIR/http/cves/$year"
            fi
          done
          CVE_PATHS="${CVE_PATHS#,}"
          TEMPLATE_PATHS="$CVE_PATHS,$TEMPLATES_DIR/http/misconfiguration,$TEMPLATES_DIR/http/exposed-panels"

          timeout 18000 nuclei -l input.txt \
            -t "$TEMPLATE_PATHS" \
            -itags cve,cors,panel,admin \
            -etags ssl,tls,http-missing-headers,tech,info,dns,helpers,passive \
            -severity low,medium,high,critical \
            -H "User-Agent: Mozilla/5.0 BugBounty/42 (YWH) Chemical Oxidizer CS_YWH/BB" \
            -H "X-Bug-Bounty: HackerOne-potassium_permanganate, HackerOne-oxidizer" \
            -H "X-Bugcrowd-Research: Chemical, Oxidizer" \
            -H "X-Intigriti-Research: chemical, oxidizer" \
            -silent -retries 0 -timeout 3 \
            -bulk-size 50 -concurrency 50 \
            -rate-limit 5 -fhr -max-host-error 5 \
            -no-color -o results.txt || true

          echo "Findings: $(wc -l < results.txt)"

      - name: Show results
        if: always()
        run: |
          count=$(wc -l < results.txt 2>/dev/null || echo 0)
          echo "Total findings: $count"
          if [ "$count" -gt "0" ]; then cat results.txt; else echo "No findings"; fi

      - name: Check for results
        id: check
        run: |
          if [ -s results.txt ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "count=$(wc -l < results.txt)" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "count=0" >> $GITHUB_OUTPUT
          fi

      - name: Send email alert
        if: steps.check.outputs.found == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "[Daily Main ${{ matrix.batch }}] ${{ steps.check.outputs.count }} Finding(s)"
          body: file://results.txt
          to: ${{ secrets.EMAIL_TO }}
          from: BugBountyBot

  # ─── 403 BYPASS: always 20 parallel jobs ───────────────────────
  bypass_403:
    needs: prepare
    if: needs.prepare.outputs.has_403 == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        batch: ${{ fromJson(needs.prepare.outputs.batches) }}
    steps:
      - name: Download host lists
        uses: actions/download-artifact@v4
        with:
          name: daily-hosts

      - name: Slice 403 hosts for this batch
        run: |
          total=$(wc -l < live_hosts_403.txt)
          num_batches=${{ strategy.job-total }}
          batch_num=${{ matrix.batch }}
          batch_size=$(( (total + num_batches - 1) / num_batches ))
          start=$(( (batch_num - 1) * batch_size + 1 ))
          end=$(( batch_num * batch_size ))
          sed -n "${start},${end}p" live_hosts_403.txt > input_403.txt
          echo "Batch $batch_num/$num_batches: $(wc -l < input_403.txt) of $total hosts"

      - name: Get week number
        id: date
        run: echo "week=$(date +'%Y-%U')" >> $GITHUB_OUTPUT

      - name: Cache Go tools
        uses: actions/cache@v4
        id: cache-go
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-v4

      - name: Install nuclei
        if: steps.cache-go.outputs.cache-hit != 'true'
        run: go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest

      - name: Ensure nuclei installed
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          if ! command -v nuclei &>/dev/null; then
            go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          fi

      - name: Cache nuclei templates
        uses: actions/cache@v4
        with:
          path: ~/.local/share/nuclei-templates
          key: nuclei-templates-${{ runner.os }}-${{ steps.date.outputs.week }}
          restore-keys: nuclei-templates-${{ runner.os }}-

      - name: Download nuclei templates
        run: |
          mkdir -p $HOME/.local/share/nuclei-templates
          if [ ! -d "$HOME/.local/share/nuclei-templates/http" ]; then
            git clone --depth 1 https://github.com/projectdiscovery/nuclei-templates.git \
              $HOME/.local/share/nuclei-templates || true
          fi

      - name: Run 403 bypass scan
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          TEMPLATES_DIR="$HOME/.local/share/nuclei-templates"
          touch results.txt

          if [ ! -s input_403.txt ]; then
            echo "No targets for this batch"
            exit 0
          fi

          timeout 6000 nuclei -l input_403.txt \
            -t "$TEMPLATES_DIR/http/misconfiguration" \
            -itags 403 \
            -severity low,medium,high,critical \
            -silent -retries 0 -timeout 3 \
            -bulk-size 50 -concurrency 50 \
            -rate-limit 5 -fhr -max-host-error 5 \
            -no-color -o results.txt || true

          echo "Findings: $(wc -l < results.txt)"

      - name: Show results
        if: always()
        run: |
          count=$(wc -l < results.txt 2>/dev/null || echo 0)
          echo "Total findings: $count"
          if [ "$count" -gt "0" ]; then cat results.txt; else echo "No findings"; fi

      - name: Check for results
        id: check
        run: |
          if [ -s results.txt ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "count=$(wc -l < results.txt)" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "count=0" >> $GITHUB_OUTPUT
          fi

      - name: Send email alert
        if: steps.check.outputs.found == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "[403 Bypass ${{ matrix.batch }}] ${{ steps.check.outputs.count }} Finding(s)"
          body: file://results.txt
          to: ${{ secrets.EMAIL_TO }}
          from: BugBountyBot
