name: Weekly Scans
on:
  schedule:
    - cron: '0 12 * * 0'
  workflow_dispatch:

jobs:
  # ─── COMBINED WEEKLY SCAN ──────────────────────────────────────
  # JWT + GraphQL + Swagger + Git/Env + Exposed Files +
  # Default Logins + Dev Tools + S3 + SpringBoot in one nuclei run
  # These all use live_hosts and change slowly — weekly is enough
  weekly_combined:
    uses: ./.github/workflows/scan-template.yml
    with:
      scan_name: "Weekly Combined"
      tags: "jwt,graphql,swagger,api-docs,openapi,git,env-file,config,exposure,file,default-login,jenkins,grafana,kibana,aws-s3,s3,springboot,actuator"
      severity: "low,medium,high,critical"
      input_file: "live_hosts"
    secrets:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
