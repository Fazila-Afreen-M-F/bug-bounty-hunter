name: Weekly Scan
on:
  schedule:
    - cron: '30 20 * * 5'
  workflow_dispatch:
jobs:
  # ─── 1. WEEKLY COMBINED PART A ─────────────────────────────────
  # First half of live_hosts
  # JWT + GraphQL + Swagger + Git/Env + Default Logins + Dev Tools + S3 + SpringBoot
  weekly_combined_a:
    uses: ./.github/workflows/scan-template.yml
    with:
      scan_name: "Weekly Combined A"
      tags: "jwt,graphql,swagger,api-docs,openapi,git,env-file,default-login,jenkins,grafana,kibana,aws-s3,s3,springboot,actuator"
      severity: "low,medium,high,critical"
      input_file: "new_first"
      split: "first"
    secrets:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
  # ─── 2. WEEKLY COMBINED PART B ─────────────────────────────────
  # Second half of live_hosts
  weekly_combined_b:
    uses: ./.github/workflows/scan-template.yml
    with:
      scan_name: "Weekly Combined B"
      tags: "jwt,graphql,swagger,api-docs,openapi,git,env-file,default-login,jenkins,grafana,kibana,aws-s3,s3,springboot,actuator"
      severity: "low,medium,high,critical"
      input_file: "new_first"
      split: "second"
    secrets:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
  # ─── 3. JS SECRETS SCAN ────────────────────────────────────────
  # Katana crawls hosts (capped at 50, 30 min timeout)
  # Nuclei scans crawled URLs for secrets and keys in JS
  weekly_js_secrets:
    uses: ./.github/workflows/scan-template.yml
    with:
      scan_name: "JS Secrets"
      tags: "token,secret,api-key,generic-tokens"
      severity: "low,medium,high,critical"
      use_katana: true
      input_file: "new_first"
    secrets:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
  # ─── 4. CUSTOM TEMPLATES ───────────────────────────────────────
  # Runs ONLY our hand-crafted templates
  # Covers: graphql-field-suggestion-leak, spring-boot-actuator-exposed,
  #         swagger-unauthenticated-execution
  weekly_custom:
    uses: ./.github/workflows/scan-template.yml
    with:
      scan_name: "Custom Templates"
      use_custom_only: true
      severity: "low,medium,high,critical"
      input_file: "new_first"
    secrets:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
