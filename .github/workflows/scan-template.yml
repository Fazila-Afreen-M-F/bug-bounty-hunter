name: Scan Template Engine

on:
  workflow_call:
    inputs:
      scan_name:
        required: true
        type: string
      tags:
        required: false
        type: string
        default: ''
      severity:
        required: false
        type: string
        default: 'low,medium,high,critical'
      use_katana:
        required: false
        type: boolean
        default: false
      use_custom_only:
        required: false
        type: boolean
        default: false
      input_file:
        required: false
        type: string
        default: 'live_hosts'
      split:
        required: false
        type: string
        default: ''
    secrets:
      EMAIL_USER:
        required: true
      EMAIL_PASS:
        required: true
      EMAIL_TO:
        required: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout domains branch
        uses: actions/checkout@v4
        with:
          ref: domains
          fetch-depth: 1

      - name: Checkout custom templates from main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-repo
          fetch-depth: 1

      - name: Copy custom templates
        run: |
          if [ -d main-repo/custom-templates ] && [ "$(ls -A main-repo/custom-templates)" ]; then
            cp -r main-repo/custom-templates ./custom-templates
            echo "Custom templates: $(ls custom-templates | wc -l) files"
          else
            mkdir -p custom-templates
            echo "No custom templates found"
          fi

      - name: Get week number
        id: date
        run: echo "week=$(date +'%Y-%U')" >> $GITHUB_OUTPUT

      - name: Cache Go tools
        uses: actions/cache@v4
        id: cache-go
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-v4

      - name: Install Go tools
        if: steps.cache-go.outputs.cache-hit != 'true'
        run: |
          go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          go install github.com/projectdiscovery/katana/cmd/katana@latest

      - name: Ensure tools installed
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          if ! command -v nuclei &> /dev/null; then
            echo "nuclei not found, installing..."
            go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          else
            echo "nuclei found: $(nuclei -version 2>&1 | head -1)"
          fi
          if ! command -v katana &> /dev/null; then
            echo "katana not found, installing..."
            go install github.com/projectdiscovery/katana/cmd/katana@latest
          else
            echo "katana found"
          fi

      - name: Cache nuclei templates
        uses: actions/cache@v4
        id: cache-templates
        with:
          path: ~/.local/share/nuclei-templates
          key: nuclei-templates-${{ runner.os }}-${{ steps.date.outputs.week }}
          restore-keys: |
            nuclei-templates-${{ runner.os }}-

      - name: Download nuclei templates
        if: steps.cache-templates.outputs.cache-hit != 'true'
        run: |
          mkdir -p $HOME/.local/share/nuclei-templates
          git clone --depth 1 https://github.com/projectdiscovery/nuclei-templates.git \
            $HOME/.local/share/nuclei-templates || true
          echo "Templates downloaded: $(ls $HOME/.local/share/nuclei-templates | wc -l) folders"

      - name: Prepare input
        run: |
          INPUT="${{ inputs.input_file }}"
          SPLIT="${{ inputs.split }}"

          if [ "$INPUT" = "live_hosts_403" ]; then
            cp live_hosts_403.txt input.txt 2>/dev/null || touch input.txt
          elif [ "$INPUT" = "live_hosts_404" ]; then
            cp live_hosts_404.txt input.txt 2>/dev/null || touch input.txt
          elif [ "$INPUT" = "new_live_hosts" ]; then
            cp new_live_hosts.txt input.txt 2>/dev/null || touch input.txt
          elif [ "$INPUT" = "new_first" ]; then
            touch input.txt
            if [ -f new_live_hosts.txt ] && [ -s new_live_hosts.txt ]; then
              cat new_live_hosts.txt >> input.txt
            fi
            if [ -f live_hosts.txt ] && [ -s live_hosts.txt ]; then
              if [ -f new_live_hosts.txt ] && [ -s new_live_hosts.txt ]; then
                comm -23 <(sort live_hosts.txt) <(sort new_live_hosts.txt) >> input.txt || true
              else
                cat live_hosts.txt >> input.txt
              fi
            fi
          elif [ -f live_hosts.txt ] && [ -s live_hosts.txt ]; then
            cp live_hosts.txt input.txt
          else
            touch input.txt
          fi

          # Apply split if specified
          if [ -n "$SPLIT" ] && [ -s input.txt ]; then
            total=$(wc -l < input.txt)
            half=$(( (total + 1) / 2 ))
            if [ "$SPLIT" = "first" ]; then
              head -n "$half" input.txt > input_split.txt
              mv input_split.txt input.txt
              echo "Split: first half ($half of $total targets)"
            elif [ "$SPLIT" = "second" ]; then
              tail -n "+$((half + 1))" input.txt > input_split.txt
              mv input_split.txt input.txt
              echo "Split: second half ($((total - half)) of $total targets)"
            fi
          fi

          echo "Total targets: $(wc -l < input.txt)"

      - name: Run katana
        if: inputs.use_katana == true
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin

          head -50 input.txt > katana_input.txt

          timeout 1800 katana -list katana_input.txt \
            -silent \
            -js-crawl \
            -depth 1 \
            -timeout 5 \
            -rl 5 \
            -concurrency 5 \
            -max-response-size 2000000 \
            -H "User-Agent: Mozilla/5.0 BugBounty/42 (YWH) Chemical Oxidizer CS_YWH/BB" \
            -H "X-Bug-Bounty: HackerOne-potassium_permanganate, HackerOne-oxidizer" \
            -H "X-Bugcrowd-Research: Chemical, Oxidizer" \
            -H "X-Intigriti-Research: chemical, oxidizer" \
            -o urls.txt || true

          if [ -f urls.txt ]; then
            sort -u urls.txt | head -1000 > urls_capped.txt
            mv urls_capped.txt urls.txt
          else
            touch urls.txt
          fi
          echo "URLs found: $(wc -l < urls.txt 2>/dev/null || echo 0)"

      - name: Run nuclei
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          TEMPLATES_DIR="$HOME/.local/share/nuclei-templates"
          SEVERITY="${{ inputs.severity }}"
          TAGS="${{ inputs.tags }}"
          USE_CUSTOM_ONLY="${{ inputs.use_custom_only }}"

          if [ "${{ inputs.use_katana }}" = "true" ] && [ -f urls.txt ] && [ -s urls.txt ]; then
            INPUT_FILE="urls.txt"
          else
            INPUT_FILE="input.txt"
          fi

          if [ ! -s "$INPUT_FILE" ]; then
            echo "No targets, skipping"
            touch results.txt
            exit 0
          fi

          if [ "$USE_CUSTOM_ONLY" = "true" ]; then
            if [ -d custom-templates ] && [ "$(ls -A custom-templates)" ]; then
              T_FLAG="-t custom-templates"
            else
              echo "No custom templates found, skipping"
              touch results.txt
              exit 0
            fi
          else
            TEMPLATE_PATHS=""
            if [[ "$TAGS" == *"cve"* ]]; then
              TEMPLATE_PATHS="$TEMPLATE_PATHS,$TEMPLATES_DIR/http/cves"
            fi
            if [[ "$TAGS" == *"cors"* ]] || [[ "$TAGS" == *"403"* ]] || [[ "$TAGS" == *"graphql"* ]] || [[ "$TAGS" == *"springboot"* ]] || [[ "$TAGS" == *"actuator"* ]]; then
              TEMPLATE_PATHS="$TEMPLATE_PATHS,$TEMPLATES_DIR/http/misconfiguration"
            fi
            if [[ "$TAGS" == *"panel"* ]] || [[ "$TAGS" == *"admin"* ]] || [[ "$TAGS" == *"swagger"* ]] || [[ "$TAGS" == *"api-docs"* ]] || [[ "$TAGS" == *"openapi"* ]]; then
              TEMPLATE_PATHS="$TEMPLATE_PATHS,$TEMPLATES_DIR/http/exposed-panels"
            fi
            if [[ "$TAGS" == *"takeover"* ]] || [[ "$TAGS" == *"subdomain-takeover"* ]]; then
              TEMPLATE_PATHS="$TEMPLATE_PATHS,$TEMPLATES_DIR/http/takeovers"
            fi
            if [[ "$TAGS" == *"token"* ]] || [[ "$TAGS" == *"secret"* ]] || [[ "$TAGS" == *"api-key"* ]] || [[ "$TAGS" == *"generic-tokens"* ]] || [[ "$TAGS" == *"git"* ]] || [[ "$TAGS" == *"env-file"* ]] || [[ "$TAGS" == *"jwt"* ]]; then
              TEMPLATE_PATHS="$TEMPLATE_PATHS,$TEMPLATES_DIR/http/exposures"
            fi
            if [[ "$TAGS" == *"default-login"* ]] || [[ "$TAGS" == *"jenkins"* ]] || [[ "$TAGS" == *"grafana"* ]] || [[ "$TAGS" == *"kibana"* ]]; then
              TEMPLATE_PATHS="$TEMPLATE_PATHS,$TEMPLATES_DIR/http/default-logins"
            fi
            if [[ "$TAGS" == *"s3"* ]] || [[ "$TAGS" == *"aws-s3"* ]]; then
              TEMPLATE_PATHS="$TEMPLATE_PATHS,$TEMPLATES_DIR/cloud"
            fi

            TEMPLATE_PATHS="${TEMPLATE_PATHS#,}"

            if [ -z "$TEMPLATE_PATHS" ]; then
              T_FLAG="-t $TEMPLATES_DIR"
            else
              T_FLAG="-t $TEMPLATE_PATHS"
            fi
          fi

          TAGS_FLAG=""
          if [ -n "$TAGS" ] && [ "$USE_CUSTOM_ONLY" = "false" ]; then
            TAGS_FLAG="-itags $TAGS"
          fi

          echo "Templates: $T_FLAG"
          echo "Tags: $TAGS_FLAG"

          timeout 21000 nuclei -l "$INPUT_FILE" \
            $T_FLAG \
            $TAGS_FLAG \
            -etags ssl,tls,http-missing-headers,tech,info,dns,helpers,passive \
            -severity "$SEVERITY" \
            -H "User-Agent: Mozilla/5.0 BugBounty/42 (YWH) Chemical Oxidizer CS_YWH/BB" \
            -H "X-Bug-Bounty: HackerOne-potassium_permanganate, HackerOne-oxidizer" \
            -H "X-Bugcrowd-Research: Chemical, Oxidizer" \
            -H "X-Intigriti-Research: chemical, oxidizer" \
            -silent \
            -retries 1 \
            -timeout 10 \
            -bulk-size 75 \
            -concurrency 75 \
            -rate-limit 5 \
            -fhr \
            -max-host-error 75 \
            -no-color \
            -o results.txt || true

          echo "Findings: $(wc -l < results.txt 2>/dev/null || echo 0)"

      - name: Show results
        if: always()
        run: |
          count=$(wc -l < results.txt 2>/dev/null || echo 0)
          echo "Total findings: $count"
          if [ "$count" -gt "0" ]; then cat results.txt; else echo "No findings"; fi

      - name: Check for results
        id: check
        run: |
          if [ -s results.txt ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "count=$(wc -l < results.txt)" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "count=0" >> $GITHUB_OUTPUT
          fi

      - name: Send email alert
        if: steps.check.outputs.found == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "[${{ inputs.scan_name }}] ${{ steps.check.outputs.count }} Finding(s)"
          body: file://results.txt
          to: ${{ secrets.EMAIL_TO }}
          from: BugBountyBot
