name: Weekly Vet
# ─────────────────────────────────────────────────────────────────────────────
# SCHEDULE: every Saturday, 00:00 IST (Friday 18:30 UTC)
# Runs discover_all_programs.py — full discovery + ban-detection (regex + Cerebras)
# across HackerOne, Intigriti, Bugcrowd, YesWeHack. Updates per-platform scope
# files and domain_program_map.csv, then commits results to main.
#
# Manual trigger: workflow_dispatch with no inputs = runs everything
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
  schedule:
    - cron: '30 18 * * 5'   # every Friday 18:30 UTC = Saturday 00:00 IST

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      HACKERONE_TOKEN: ${{ secrets.HACKERONE_TOKEN }}
      INTIGRITI_TOKEN: ${{ secrets.INTIGRITI_TOKEN }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
      OUTPUT_DIR: ${{ github.workspace }}
      MAPPING_CSV_PATH: ${{ github.workspace }}/domain_program_map.csv
      EXCLUDED_OUTPUT_PATH: ${{ github.workspace }}/excluded_domains.txt
    steps:
      - name: Checkout main (script + CSV)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Checkout domains branch
        uses: actions/checkout@v4
        with:
          ref: domains
          path: domains-branch
          fetch-depth: 1

      - name: Install tldextract
        run: |
          pip install tldextract --break-system-packages

      - name: Run weekly validation
        env:
          DOMAINS_TXT_PATH: ${{ github.workspace }}/domains-branch/domains.txt
        run: |
          python3 discover_all_programs.py

      - name: Validate pipeline output
        env:
          DOMAINS_TXT_PATH: ${{ github.workspace }}/domains-branch/domains.txt
        run: |
          python3 validate_pipeline.py

      - name: Commit updated CSV and scope files
        run: |
          git config --global user.email "bugbountybot@github.com"
          git config --global user.name "BugBountyBot"
          git add -f domain_program_map.csv \
            hackerone_scope.txt intigriti_scope.txt yeswehack_scope.txt bugcrowd_scope.txt \
            excluded_domains.txt \
            cerebras_ban_cache.json \
            discovery_stats.csv \
            hackerone_excluded_full.txt intigriti_excluded_full.txt yeswehack_excluded_full.txt bugcrowd_excluded_full.txt \
            hackerone_skipped_full.txt intigriti_skipped_full.txt yeswehack_skipped_full.txt bugcrowd_skipped_full.txt \
            yeswehack_unmatched.log \
            2>/dev/null || true
          git diff --staged --quiet || git commit -m "Weekly program validation $(date +'%Y-%m-%d')"
          git push origin main || (git pull --rebase origin main && git push origin main) || {
            echo "::error::Push to main failed after rebase retry"
            exit 1
          }

      - name: Commit updated domains.txt to domains branch
        run: |
          cd domains-branch
          git config --global user.email "bugbountybot@github.com"
          git config --global user.name "BugBountyBot"
          git add -f domains.txt domains_diff.log 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Weekly validation: rebuild domains.txt (added/removed) $(date +'%Y-%m-%d')"
          git push origin domains || (git pull --rebase origin domains && git push origin domains) || {
            echo "::error::Push to domains branch failed after rebase retry"
            exit 1
          }

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-vet-logs
          path: |
            cerebras_review_log.txt
            cerebras_429_debug.log
          retention-days: 30
