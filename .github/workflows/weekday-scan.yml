name: Weekday Scan
on:
  schedule:
    - cron: '30 18 * * *'   # 12:00am IST every day (UTC 18:30)
  workflow_dispatch:

concurrency:
  group: bug-bounty-pipeline
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      batches: ${{ steps.split.outputs.batches }}
      has_hosts: ${{ steps.split.outputs.has_hosts }}
      has_403: ${{ steps.split.outputs.has_403 }}
      has_404: ${{ steps.split.outputs.has_404 }}
    steps:
      - name: Checkout domains branch
        uses: actions/checkout@v4
        with:
          ref: domains
          fetch-depth: 1

      - name: Checkout status checker from main
        uses: actions/checkout@v4
        with:
          ref: main
          path: checker
          fetch-depth: 1

      - name: Build host lists + calculate splits
        id: split
        run: |
          touch live_hosts.txt new_live_hosts.txt live_hosts_403.txt live_hosts_404.txt

          > combined.txt
          if [ -s new_live_hosts.txt ]; then
            cat new_live_hosts.txt >> combined.txt
          fi
          if [ -s live_hosts.txt ]; then
            if [ -s new_live_hosts.txt ]; then
              comm -23 <(sort live_hosts.txt) <(sort new_live_hosts.txt) >> combined.txt || true
            else
              cat live_hosts.txt >> combined.txt
            fi
          fi

          echo "Hosts before suspension filter: $(wc -l < combined.txt)"
          echo "403 before filter: $(wc -l < live_hosts_403.txt)"
          echo "404 before filter: $(wc -l < live_hosts_404.txt)"

          export HACKERONE_TOKEN="${{ secrets.HACKERONE_TOKEN }}"
          export INTIGRITI_TOKEN="${{ secrets.INTIGRITI_TOKEN }}"
          export MAPPING_CSV_PATH="checker/domain_program_map.csv"
          export EXCLUDED_OUTPUT_PATH="excluded_domains.txt"
          export HACKERONE_SCOPE_OUTPUT_PATH="hackerone_scope.txt"
          export INTIGRITI_SCOPE_OUTPUT_PATH="intigriti_scope.txt"
          export YESWEHACK_SCOPE_OUTPUT_PATH="yeswehack_scope.txt"
          export BUGCROWD_SCOPE_OUTPUT_PATH="bugcrowd_scope.txt"
          python3 checker/check_program_status.py

          if [ -s excluded_domains.txt ]; then
            > exclude_grep.txt
            while IFS= read -r d; do
              [ -z "$d" ] && continue
              escaped=$(echo "$d" | sed 's/\./\\./g')
              echo "\\.${escaped}\$|^${escaped}\$" >> exclude_grep.txt
            done < excluded_domains.txt

            grep -vEf exclude_grep.txt combined.txt > combined_filtered.txt || cp combined.txt combined_filtered.txt
            echo "Excluded $(( $(wc -l < combined.txt) - $(wc -l < combined_filtered.txt) )) hosts (main batch) belonging to suspended/paused programs"
            mv combined_filtered.txt combined.txt

            grep -vEf exclude_grep.txt live_hosts_403.txt > h403_filtered.txt || cp live_hosts_403.txt h403_filtered.txt
            mv h403_filtered.txt live_hosts_403.txt

            grep -vEf exclude_grep.txt live_hosts_404.txt > h404_filtered.txt || cp live_hosts_404.txt h404_filtered.txt
            mv h404_filtered.txt live_hosts_404.txt
          fi

          echo "Hosts after suspension filter: $(wc -l < combined.txt)"
          echo "403 after filter: $(wc -l < live_hosts_403.txt)"
          echo "404 after filter: $(wc -l < live_hosts_404.txt)"

          total=$(wc -l < combined.txt)
          total_403=$(wc -l < live_hosts_403.txt)
          total_404=$(wc -l < live_hosts_404.txt)
          echo "Total: $total | 403: $total_403 | 404: $total_404"

          if [ "$total" -eq 0 ]; then
            echo "has_hosts=false" >> $GITHUB_OUTPUT
            echo "batches=[]" >> $GITHUB_OUTPUT
          else
            echo "has_hosts=true" >> $GITHUB_OUTPUT
            target_per_batch=50
            num_batches=$(( (total + target_per_batch - 1) / target_per_batch ))
            if [ "$num_batches" -gt 256 ]; then num_batches=256; fi
            if [ "$num_batches" -lt 1 ]; then num_batches=1; fi
            batches=$(seq 1 $num_batches | jq -R . | jq -sc .)
            echo "batches=$batches" >> $GITHUB_OUTPUT
            echo "Batches: $num_batches (~$(( (total + num_batches - 1) / num_batches )) hosts each)"
          fi

          [ "$total_403" -gt 0 ] && echo "has_403=true" >> $GITHUB_OUTPUT || echo "has_403=false" >> $GITHUB_OUTPUT
          [ "$total_404" -gt 0 ] && echo "has_404=true" >> $GITHUB_OUTPUT || echo "has_404=false" >> $GITHUB_OUTPUT

      - name: Upload host lists
        uses: actions/upload-artifact@v4
        with:
          name: daily-hosts
          path: |
            combined.txt
            live_hosts_403.txt
            live_hosts_404.txt
          retention-days: 7

  # ─── SUBZY: subdomain takeover (CNAME-fingerprint based) ──────
  subzy_takeover:
    needs: prepare
    if: needs.prepare.outputs.has_hosts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Download host lists
        uses: actions/download-artifact@v4
        with:
          name: daily-hosts
      - name: Cache Go tools
        uses: actions/cache@v4
        id: cache-go-subzy
        with:
          path: ~/go/bin
          key: go-tools-subzy-${{ runner.os }}-v1
      - name: Install subzy
        if: steps.cache-go-subzy.outputs.cache-hit != 'true'
        run: go install -v github.com/PentestPad/subzy@latest
      - name: Ensure subzy installed
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          if ! command -v subzy &>/dev/null; then
            go install -v github.com/PentestPad/subzy@latest
          fi
      - name: Run subzy takeover scan
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          touch subzy_results.txt
          if [ -s combined.txt ]; then
            timeout 3000 subzy run --targets combined.txt --hide_fails --verify_ssl -o subzy_results.txt || true
          fi
          echo "Findings: $(wc -l < subzy_results.txt)"
      - name: Show results
        id: showresults
        if: always()
        run: |
          count=$(wc -l < subzy_results.txt 2>/dev/null || echo 0)
          echo "count=$count" >> $GITHUB_OUTPUT
          echo "Total findings: $count"
          if [ "$count" -gt "0" ]; then cat subzy_results.txt; else echo "No findings"; fi
      - name: Immediate email if findings
        if: steps.showresults.outputs.count != '0'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "[Subzy Takeover] ${{ steps.showresults.outputs.count }} Finding(s)"
          body: file://subzy_results.txt
          to: ${{ secrets.EMAIL_TO }}
          from: BugBountyBot
      - name: Upload subzy results
        uses: actions/upload-artifact@v4
        with:
          name: subzy-results
          path: subzy_results.txt
  # ─── TAKEOVER ──────────────────────────────────────────────────
  takeover:
    needs: prepare
    if: needs.prepare.outputs.has_hosts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Download host lists
        uses: actions/download-artifact@v4
        with:
          name: daily-hosts

      - name: Get week number
        id: date
        run: echo "week=$(date +'%Y-%U')" >> $GITHUB_OUTPUT

      - name: Cache Go tools
        uses: actions/cache@v4
        id: cache-go
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-v4

      - name: Install nuclei
        if: steps.cache-go.outputs.cache-hit != 'true'
        run: go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest

      - name: Ensure nuclei installed
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          if ! command -v nuclei &>/dev/null; then
            go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          fi

      - name: Cache nuclei templates
        uses: actions/cache@v4
        with:
          path: ~/.local/share/nuclei-templates
          key: nuclei-templates-${{ runner.os }}-${{ steps.date.outputs.week }}
          restore-keys: nuclei-templates-${{ runner.os }}-

      - name: Download nuclei templates
        run: |
          mkdir -p $HOME/.local/share/nuclei-templates
          if [ ! -d "$HOME/.local/share/nuclei-templates/http" ]; then
            git clone --depth 1 https://github.com/projectdiscovery/nuclei-templates.git \
              $HOME/.local/share/nuclei-templates || true
          fi

      - name: Run takeover scan
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          TEMPLATES_DIR="$HOME/.local/share/nuclei-templates"
          touch results.txt
          if [ ! -s live_hosts_404.txt ]; then
            echo "No targets for this batch"
            exit 0
          fi
          timeout 6000 nuclei -l live_hosts_404.txt \
            -t "$TEMPLATES_DIR/http/takeovers" \
            -itags takeover,subdomain-takeover \
            -etags ssl,tls,http-missing-headers,tech,info,dns,helpers,passive \
            -severity low,medium,high,critical \
            -H "User-Agent: Mozilla/5.0 BugBounty/42 (YWH) Chemical Oxidizer CS_YWH/BB" \
            -H "X-Bug-Bounty: HackerOne-Chemical, HackerOne-Oxidizer" \
            -H "X-Bugcrowd-Research: Chemical, Oxidizer" \
            -H "X-Intigriti-Research: Chemical, Oxidizer" \
            -H "X-YesWeHack-Research: Chemical, Oxidizer" \
            -silent -retries 0 -timeout 3 \
            -bulk-size 50 -concurrency 50 \
            -rate-limit 5 -fhr -max-host-error 30 \
            -no-color -o results.txt || true
          echo "Findings: $(wc -l < results.txt)"

      - name: Show results
        id: showresults
        if: always()
        run: |
          count=$(wc -l < results.txt 2>/dev/null || echo 0)
          echo "count=$count" >> $GITHUB_OUTPUT
          echo "Total findings: $count"
          if [ "$count" -gt "0" ]; then cat results.txt; else echo "No findings"; fi

      - name: Immediate email if findings
        if: steps.showresults.outputs.count != '0'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "[Takeover] ${{ steps.showresults.outputs.count }} Finding(s)"
          body: file://results.txt
          to: ${{ secrets.EMAIL_TO }}
          from: BugBountyBot

      - name: Upload takeover results
        uses: actions/upload-artifact@v4
        with:
          name: takeover-results
          path: results.txt
          retention-days: 7

  # ─── MAIN DAILY: max-parallel 10 ───────────────────────
  daily_main:
    needs: prepare
    if: needs.prepare.outputs.has_hosts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        batch: ${{ fromJson(needs.prepare.outputs.batches) }}
    steps:
      - name: Download host list
        uses: actions/download-artifact@v4
        with:
          name: daily-hosts

      - name: Slice hosts for this batch
        run: |
          total=$(wc -l < combined.txt)
          num_batches=${{ strategy.job-total }}
          batch_num=${{ matrix.batch }}
          batch_size=$(( (total + num_batches - 1) / num_batches ))
          start=$(( (batch_num - 1) * batch_size + 1 ))
          end=$(( batch_num * batch_size ))
          sed -n "${start},${end}p" combined.txt > input.txt
          echo "Batch $batch_num/$num_batches: $(wc -l < input.txt) of $total hosts"

      - name: Get week number
        id: date
        run: echo "week=$(date +'%Y-%U')" >> $GITHUB_OUTPUT

      - name: Cache Go tools
        uses: actions/cache@v4
        id: cache-go
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-v4

      - name: Install nuclei
        if: steps.cache-go.outputs.cache-hit != 'true'
        run: go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest

      - name: Ensure nuclei installed
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          if ! command -v nuclei &>/dev/null; then
            go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          fi

      - name: Cache nuclei templates
        uses: actions/cache@v4
        id: cache-templates
        with:
          path: ~/.local/share/nuclei-templates
          key: nuclei-templates-${{ runner.os }}-${{ steps.date.outputs.week }}
          restore-keys: nuclei-templates-${{ runner.os }}-

      - name: Download nuclei templates
        if: steps.cache-templates.outputs.cache-hit != 'true'
        run: |
          mkdir -p $HOME/.local/share/nuclei-templates
          git clone --depth 1 https://github.com/projectdiscovery/nuclei-templates.git \
            $HOME/.local/share/nuclei-templates || true

      - name: Run nuclei
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          TEMPLATES_DIR="$HOME/.local/share/nuclei-templates"
          touch results.txt

          if [ ! -s input.txt ]; then
            echo "No targets for this batch"
            exit 0
          fi

          CVE_PATHS=""
          for year in 2022 2023 2024 2025; do
            if [ -d "$TEMPLATES_DIR/http/cves/$year" ]; then
              CVE_PATHS="$CVE_PATHS,$TEMPLATES_DIR/http/cves/$year"
            fi
          done
          CVE_PATHS="${CVE_PATHS#,}"
          TEMPLATE_PATHS="$CVE_PATHS,$TEMPLATES_DIR/http/misconfiguration,$TEMPLATES_DIR/http/exposed-panels"

          timeout 18000 nuclei -l input.txt \
            -t "$TEMPLATE_PATHS" \
            -itags cve,cors,panel,admin \
            -etags ssl,tls,http-missing-headers,tech,info,dns,helpers,passive \
            -severity low,medium,high,critical \
            -H "User-Agent: Mozilla/5.0 BugBounty/42 (YWH) Chemical Oxidizer CS_YWH/BB" \
            -H "X-Bug-Bounty: HackerOne-Chemical, HackerOne-Oxidizer" \
            -H "X-Bugcrowd-Research: Chemical, Oxidizer" \
            -H "X-Intigriti-Research: Chemical, Oxidizer" \
            -H "X-YesWeHack-Research: Chemical, Oxidizer" \
            -silent -retries 0 -timeout 3 \
            -bulk-size 50 -concurrency 50 \
            -rate-limit 5 -fhr -max-host-error 30 \
            -no-color -o results.txt || true

          echo "Findings: $(wc -l < results.txt)"

      - name: Show results
        id: showresults
        if: always()
        run: |
          count=$(wc -l < results.txt 2>/dev/null || echo 0)
          echo "count=$count" >> $GITHUB_OUTPUT
          echo "Total findings: $count"
          if [ "$count" -gt "0" ]; then cat results.txt; else echo "No findings"; fi

      - name: Immediate email if findings
        if: steps.showresults.outputs.count != '0'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "[Daily Main - Batch ${{ matrix.batch }}] ${{ steps.showresults.outputs.count }} Finding(s)"
          body: file://results.txt
          to: ${{ secrets.EMAIL_TO }}
          from: BugBountyBot

      - name: Upload batch results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-results-${{ matrix.batch }}
          path: results.txt
          retention-days: 7

  # ─── 403 BYPASS: max-parallel 9 ───────────────────────
  bypass_403:
    needs: prepare
    if: needs.prepare.outputs.has_403 == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      max-parallel: 9
      matrix:
        batch: ${{ fromJson(needs.prepare.outputs.batches) }}
    steps:
      - name: Download host lists
        uses: actions/download-artifact@v4
        with:
          name: daily-hosts

      - name: Slice 403 hosts for this batch
        run: |
          total=$(wc -l < live_hosts_403.txt)
          num_batches=${{ strategy.job-total }}
          batch_num=${{ matrix.batch }}
          batch_size=$(( (total + num_batches - 1) / num_batches ))
          start=$(( (batch_num - 1) * batch_size + 1 ))
          end=$(( batch_num * batch_size ))
          sed -n "${start},${end}p" live_hosts_403.txt > input_403.txt
          echo "Batch $batch_num/$num_batches: $(wc -l < input_403.txt) of $total hosts"

      - name: Get week number
        id: date
        run: echo "week=$(date +'%Y-%U')" >> $GITHUB_OUTPUT

      - name: Cache Go tools
        uses: actions/cache@v4
        id: cache-go
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-v4

      - name: Install nuclei
        if: steps.cache-go.outputs.cache-hit != 'true'
        run: go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest

      - name: Ensure nuclei installed
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          if ! command -v nuclei &>/dev/null; then
            go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          fi

      - name: Cache nuclei templates
        uses: actions/cache@v4
        with:
          path: ~/.local/share/nuclei-templates
          key: nuclei-templates-${{ runner.os }}-${{ steps.date.outputs.week }}
          restore-keys: nuclei-templates-${{ runner.os }}-

      - name: Download nuclei templates
        run: |
          mkdir -p $HOME/.local/share/nuclei-templates
          if [ ! -d "$HOME/.local/share/nuclei-templates/http" ]; then
            git clone --depth 1 https://github.com/projectdiscovery/nuclei-templates.git \
              $HOME/.local/share/nuclei-templates || true
          fi

      - name: Run 403 bypass scan
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          TEMPLATES_DIR="$HOME/.local/share/nuclei-templates"
          touch results.txt

          if [ ! -s input_403.txt ]; then
            echo "No targets for this batch"
            exit 0
          fi

          timeout 6000 nuclei -l input_403.txt \
            -t "$TEMPLATES_DIR/http/misconfiguration" \
            -itags 403 \
            -etags ssl,tls,http-missing-headers,tech,info,dns,helpers,passive \
            -severity low,medium,high,critical \
            -H "User-Agent: Mozilla/5.0 BugBounty/42 (YWH) Chemical Oxidizer CS_YWH/BB" \
            -H "X-Bug-Bounty: HackerOne-Chemical, HackerOne-Oxidizer" \
            -H "X-Bugcrowd-Research: Chemical, Oxidizer" \
            -H "X-Intigriti-Research: Chemical, Oxidizer" \
            -H "X-YesWeHack-Research: Chemical, Oxidizer" \
            -silent -retries 0 -timeout 3 \
            -bulk-size 50 -concurrency 50 \
            -rate-limit 5 -fhr -max-host-error 30 \
            -no-color -o results.txt || true

          echo "Findings: $(wc -l < results.txt)"

      - name: Show results
        id: showresults
        if: always()
        run: |
          count=$(wc -l < results.txt 2>/dev/null || echo 0)
          echo "count=$count" >> $GITHUB_OUTPUT
          echo "Total findings: $count"
          if [ "$count" -gt "0" ]; then cat results.txt; else echo "No findings"; fi

      - name: Immediate email if findings
        if: steps.showresults.outputs.count != '0'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "[403 Bypass - Batch ${{ matrix.batch }}] ${{ steps.showresults.outputs.count }} Finding(s)"
          body: file://results.txt
          to: ${{ secrets.EMAIL_TO }}
          from: BugBountyBot

      - name: Upload 403 batch results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bypass-results-${{ matrix.batch }}
          path: results.txt
          retention-days: 7

  # ─── NOTIFY: one email after all jobs finish ───────────────────
  notify:
    needs: [daily_main, bypass_403, takeover, subzy_takeover]
    if: always()
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout domains branch
        uses: actions/checkout@v4
        with:
          ref: domains
          fetch-depth: 1
      - name: Download all daily results
        uses: actions/download-artifact@v4
        with:
          path: all_results
          pattern: daily-results-*
        continue-on-error: true

      - name: Download all 403 results
        uses: actions/download-artifact@v4
        with:
          path: all_results
          pattern: bypass-results-*
        continue-on-error: true

      - name: Download takeover results
        uses: actions/download-artifact@v4
        with:
          path: all_results
          pattern: takeover-results
        continue-on-error: true

      - name: Merge, deduplicate, and filter against seen findings
        id: merge
        run: |
          find all_results -name "results.txt" | xargs cat 2>/dev/null | \
            sort -u > final_findings.txt || true
          touch seen_findings.txt
          comm -23 <(sort final_findings.txt) <(sort seen_findings.txt) > new_findings.txt || true
          count=$(wc -l < new_findings.txt)
          echo "count=$count" >> $GITHUB_OUTPUT
          echo "today=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "Total findings today: $(wc -l < final_findings.txt) | New (never emailed): $count"
          if [ "$count" -gt 0 ]; then cat new_findings.txt; fi

      - name: Send summary email
        if: steps.merge.outputs.count != '0'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "[Daily Scan] ${{ steps.merge.outputs.count }} New Finding(s) — ${{ steps.merge.outputs.today }}"
          body: file://new_findings.txt
          to: ${{ secrets.EMAIL_TO }}
          from: BugBountyBot

      - name: Update seen findings and push
        if: always()
        run: |
          cat final_findings.txt >> seen_findings.txt
          sort -u seen_findings.txt -o seen_findings.txt
          git config --global user.email "bugbountybot@github.com"
          git config --global user.name "BugBountyBot"
          git add seen_findings.txt
          git diff --staged --quiet || git commit -m "Daily scan seen findings update $(date +'%Y-%m-%d') — $(wc -l < seen_findings.txt) total seen"
          git push origin domains || (git pull --rebase origin domains && git push origin domains) || echo "::warning::Push to domains failed - seen_findings.txt may be stale, future emails could repeat findings from today"
